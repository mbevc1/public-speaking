<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Web Site</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg: #0f172a;
      --card: #020617;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 2.5rem 3rem;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 0.75rem;
      font-size: 2rem;
      color: white;
    }

    p {
      margin: 0.5rem 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .meta {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .badge {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.4rem 0.75rem;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.15);
      color: var(--accent);
      font-size: 0.85rem;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>It works</h1>

    <p>
    Hi from HashiTalks 2026!<br/>
      This page is served from <strong>S3</strong> behind
      <strong>CloudFront</strong>.
    </p>

    <p>
      If you are seeing this, your distribution, origin access control,
      and bucket policy are all wired up correctly.
    </p>

    <span class="badge">Terraform + CloudFront</span>

    <div class="meta">
      <p>Deployed at:</p>
      <p id="timestamp"></p>
    </div>
  </main>

  <script>
    const el = document.getElementById("timestamp");
    el.textContent = new Date().toISOString();
  </script>
</body>
</html>
